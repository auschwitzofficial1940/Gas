<!doctype html>
<html lang="zh-CN">
<head>
  <link rel="icon" type="image/png" href="unnamed.png">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Auschwitz Official</title>
  <style>
    :root{
      --bg: #050607;
      --fg: #00ff7f;
      --muted: rgba(0,255,127,.55);
      --glow: 0 0 16px rgba(0,255,127,.35);
    }
    html,body{height:100%; margin:0;}
    body{
      background: var(--bg);
      color: var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
                   "Noto Sans Mono CJK SC", "Noto Sans CJK SC", "PingFang SC", monospace;
      overflow:hidden;
    }


    canvas{
      position:fixed; inset:0;
      width:100%; height:100%;
      display:block;
      z-index:0;
    }


    .wrap{
      position:relative;
      z-index:1;
      height:100%;
      display:grid;
      place-items:center;
      padding: 24px;
    }
    .card{
      width:min(900px, 92vw);
      border: 1px solid rgba(0,255,127,.25);
      border-radius: 16px;
      box-shadow: var(--glow);
      backdrop-filter: blur(6px);
      background: rgba(5,6,7,.55);
      overflow:hidden;
    }
    .bar{
      display:flex;
      align-items:center;
      gap:10px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(0,255,127,.18);
    }
    .dot{width:10px;height:10px;border-radius:999px;opacity:.75}
    .dot.r{background:#ff5f57}
    .dot.y{background:#febc2e}
    .dot.g{background:#28c840}
    .title{
      margin-left: 8px;
      font-size: 13px;
      color: var(--muted);
      user-select:none;
    }
    .terminal{
      padding: 18px 18px 22px;
      line-height: 1.55;
      font-size: 15px;
    }
    .prompt{color: var(--muted)}
    .cmd{color: var(--fg)}
    .cursor{
      display:inline-block;
      width: 10px;
      margin-left: 2px;
      background: var(--fg);
      box-shadow: var(--glow);
      animation: blink 1s steps(1) infinite;
      height: 1.1em;
      vertical-align: -2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .hint{
      margin-top: 12px;
      font-size: 12px;
      color: rgba(0,255,127,.55);
    }


    @media (max-width: 480px){
      .terminal{font-size: 16px;}
    }
  </style>
</head>
<body>
  <canvas id="rain"></canvas>

  <div class="wrap">
    <div class="card">
      <div class="bar">
        <span class="dot r"></span>
        <span class="dot y"></span>
        <span class="dot g"></span>
        <div class="title">terminal://gaschamber.online</div>
      </div>
      <div class="terminal" id="terminal">
        <div><span class="prompt">visitor@site</span>:<span class="cmd">~</span>$ <span id="typed"></span><span class="cursor"></span></div>
        <div class="hint">Tip: You can report Jew at auschwitzofficial1940@gmail.com</div>
      </div>
    </div>
  </div>

  <script>

    const lines = [
      "boot --mode=stealth",
      "loading modules: Auschwitz, Gas Chamber, SS Office",
      "status: online",
      "hint: Report Jew[] to send them into Paradise",
      "Danny Who?",
      "Its GOTTA BE WHO?"
    ];
    const typedEl = document.getElementById("typed");

    async function typeLine(text, speed=28){
      for (let i=0;i<=text.length;i++){
        typedEl.textContent = text.slice(0,i);
        await new Promise(r=>setTimeout(r, speed));
      }
    }
    async function runTerminal(){
      for (const line of lines){
        await typeLine(line, 22);
        await new Promise(r=>setTimeout(r, 450));
      }

      while(true){
        await new Promise(r=>setTimeout(r, 900));
        typedEl.textContent = "status: online";
        await new Promise(r=>setTimeout(r, 400));
      }
    }
    runTerminal();

    // ====== 词雨（不是代码雨字符，而是你指定的词） ======
    const canvas = document.getElementById("rain");
    const ctx = canvas.getContext("2d", { alpha: true });

    function resize(){
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      canvas.width  = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = "100%";
      canvas.style.height = "100%";
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    window.addEventListener("resize", () => { resize(); init(); });
    resize();

    // 词
    const words = ["scott", "dep", "Deppy", "Jesuh","BioPark","Auschwitz","Jew!","Gas","Chamber","Report"];

    // 参数
    const config = {
      fontSize: 16,          // 字大小
      columnGap: 6,          // 列间距
      baseSpeed: 55,         // 基础速度（越大越慢）
      speedJitter: 30,       // 每列速度随机波动
      fade: 0.08,            // 残影强度（越小残影越明显）
      glow: true,            
    };

    let drops = [];

    function init(){
      const columns = Math.floor((window.innerWidth) / (config.fontSize + config.columnGap));
      drops = Array.from({length: columns}, () => ({
        y: Math.random() * window.innerHeight,
        speed: config.baseSpeed + Math.random() * config.speedJitter,
        w: words[Math.floor(Math.random()*words.length)],
      }));
    }
    init();

    function draw(){

      ctx.fillStyle = `rgba(5,6,7,${config.fade})`;
      ctx.fillRect(0,0,window.innerWidth, window.innerHeight);

      ctx.font = `${config.fontSize}px ui-monospace, monospace`;
      ctx.textBaseline = "top";
      ctx.fillStyle = "rgba(0,255,127,0.9)";

      if (config.glow){
        ctx.shadowColor = "rgba(0,255,127,0.45)";
        ctx.shadowBlur = 12;
      } else {
        ctx.shadowBlur = 0;
      }

      for (let i=0;i<drops.length;i++){
        const x = i * (config.fontSize + config.columnGap);
        const d = drops[i];


        ctx.fillText(d.w, x, d.y);


        d.y += (config.fontSize * 18) / d.speed;


        if (d.y > window.innerHeight + config.fontSize * 2){
          d.y = -Math.random() * 200;
          d.speed = config.baseSpeed + Math.random() * config.speedJitter;
          d.w = words[Math.floor(Math.random()*words.length)];
        }

        // 换词
        if (Math.random() < 0.002){
          d.w = words[Math.floor(Math.random()*words.length)];
        }
      }

      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
